<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática de Digitação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #efefef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #2d2d2d;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 600px;
        }

        #frase-alvo {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
            color: #aaa;
            user-select: none;
        }

        .highlight {
            color: #4caf50; /* Verde para o que já foi acertado */
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #444;
            border-radius: 6px;
            background: #1a1a1a;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #007bff;
        }

        .erro-flash {
            animation: flash 0.2s;
        }

        @keyframes flash {
            0% { background-color: #1a1a1a; }
            50% { background-color: #661010; }
            100% { background-color: #1a1a1a; }
        }

        .img-dica{
            width: 40%;
            border-radius: 20px;
            margin: 25px 0px;
        }
         /* Camada do Menu de Carregamento */
        #menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            color: white;
            transition: opacity 0.5s ease-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        /* Estrutura da Barra de Carregamento */
        .loader-bar {
            width: 300px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            animation: carregar 2s forwards cubic-bezier(0, 0, 0.58, 1);
        }
         /* Classe para esconder o menu */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        @keyframes carregar {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
<div id="menu-container">
    <h1>Dominando o teclado</h1>
    <div class="loader-bar">
        <div class="loader-fill"></div>
    </div>
    <p style="margin-top: 15px; color: #888; font-size: 0.9rem;">Carregando ambiente de treino...</p>
</div>
<div class="dica">
    Letra Maiúscula: Segure o <b>SHIFT</b> pressione a Letra e depois solte.
</div>
<img src="./dedos_no_teclado.jpeg" class="img-dica" alt="posicionamento dos dedos">
<div class="container">
    <div id="frase-alvo">Carregando frase...</div>
    <input type="text" id="campo-digito" placeholder="Comece a digitar aqui..." autofocus autocomplete="off">
    <p style="font-size: 0.8rem; color: #666; margin-top: 1rem;">Errou uma letra? Volta do começo!</p>
</div>

<script>
    const menu = document.getElementById('menu-container');
        // --- Lógica do Menu ---
        window.addEventListener('load', () => {
        setTimeout(() => {
            menu.classList.add('hidden');
        }, 2000); // 2 segundos de espera
    });
    const frases = [
        "Eu sou aluno do Senai.",
        "Estou fazendo o curso de operador de computador.",
        "O rato roeu a roupa do rei de Roma.",
        "Jabuti xereta viu dez cegonhas felizes.",
        "A prática leva à perfeição.",
        "Antes só do que mal acompanhado.",
    ];

    let fraseAtual = "";
    const displayFrase = document.getElementById('frase-alvo');
    const inputDigito = document.getElementById('campo-digito');

    function novaFrase() {
        fraseAtual = frases[Math.floor(Math.random() * frases.length)];
        displayFrase.innerText = fraseAtual;
        inputDigito.value = "";
    }

    inputDigito.addEventListener('input', () => {
        const valorDigitado = inputDigito.value;
        
        // Verifica se o que foi digitado até agora corresponde ao início da frase
        if (fraseAtual.startsWith(valorDigitado)) {
            // Se estiver certo, podemos destacar o progresso (opcional)
            const progresso = fraseAtual.substring(0, valorDigitado.length);
            const restante = fraseAtual.substring(valorDigitado.length);
            displayFrase.innerHTML = `<span class="highlight">${progresso}</span>${restante}`;

            // Se terminou a frase
            if (valorDigitado === fraseAtual) {
                alert("Parabéns! Você completou sem erros.");
                novaFrase();
            }
        } else {
            // Se errou: limpa tudo e dá um feedback visual
            inputDigito.value = "";
            displayFrase.innerHTML = fraseAtual;
            document.body.classList.add('erro-flash');
            setTimeout(() => document.body.classList.remove('erro-flash'), 200);
        }
    });

    // Iniciar
    novaFrase();
</script>

</body>
</html>
