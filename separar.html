<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Hardware: Interno vs Externo</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: sans-serif;
            color: white;
        }

        canvas {
            background-color: #ecf0f1;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            color: #bdc3c7;
        }

        /* Camada do Menu de Carregamento */
        #menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            color: white;
            transition: opacity 0.5s ease-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        /* Estrutura da Barra de Carregamento */
        .loader-bar {
            width: 300px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            animation: carregar 2s forwards cubic-bezier(0, 0, 0.58, 1);
        }
        /* Classe para esconder o menu */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        @keyframes carregar {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div id="menu-container">
        <h1>Dominando os Componentes</h1>
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
        <p style="margin-top: 15px; color: #888; font-size: 0.9rem;">Carregando ambiente de treino...</p>
    </div>
    <h1>Classificador de Hardware</h1>
    <p>Arraste os itens para o lado correto (Esquerda: Externo | Direita: Interno)</p>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
        const menu = document.getElementById('menu-container');
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let items = [];
        let draggingItem = null;
        let offsetX, offsetY;

        const components = [
            { name: "Plotter", type: "externo" },
            { name: "Scanner", type: "externo" },
            { name: "Gabinete", type: "externo" },
            { name: "Web Cam", type: "externo" },
            { name: "Caixas de som", type: "externo" },
            { name: "Microfone", type: "externo" },
            { name: "Head Set", type: "externo" },
            { name: "Processador", type: "interno" },
            { name: "Memória RAM", type: "interno" },
            { name: "Placa-mãe", type: "interno" },
            { name: "HD / SSD", type: "interno" },
            { name: "Fonte", type: "interno" }
        ];

        // --- Lógica do Menu ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                menu.classList.add('hidden');
            }, 2000); // 2 segundos de espera
        });

        // Inicializar itens em posições aleatórias na área central
        function init() {
            components.forEach(comp => {
                items.push({
                    name: comp.name,
                    type: comp.type,
                    x: Math.random() * (canvas.width - 150) + 20,
                    y: Math.random() * (canvas.height - 100) + 50,
                    width: 120,
                    height: 50,
                    color: "#3498db",
                    originalX: 0,
                    originalY: 0,
                    fixed: false
                });
            });
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Linha Divisória
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = "#7f8c8d";
            ctx.stroke();
            ctx.setLineDash([]);

            // Rótulos
            ctx.font = "20px Arial";
            ctx.fillStyle = "#e67e22";
            ctx.fillText("COMPONENTES EXTERNOS", 50, 30);
            ctx.fillStyle = "#27ae60";
            ctx.fillText("COMPONENTES INTERNOS", 480, 30);

            // Desenhar Cards
            items.forEach(item => {
                ctx.fillStyle = item.fixed ? "#95a5a6" : item.color;
                ctx.fillRect(item.x, item.y, item.width, item.height);

                // Texto do Card
                ctx.fillStyle = "white";
                ctx.font = "14px Arial";
                ctx.textAlign = "center";
                ctx.fillText(item.name, item.x + item.width / 2, item.y + item.height / 1.7);
                ctx.textAlign = "start";
            });
        }

        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            items.forEach(item => {
                if (!item.fixed && mouseX > item.x && mouseX < item.x + item.width &&
                    mouseY > item.y && mouseY < item.y + item.height) {
                    draggingItem = item;
                    item.originalX = item.x;
                    item.originalY = item.y;
                    offsetX = mouseX - item.x;
                    offsetY = mouseY - item.y;
                }
            });
        };

        canvas.onmousemove = (e) => {
            if (draggingItem) {
                const rect = canvas.getBoundingClientRect();
                draggingItem.x = e.clientX - rect.left - offsetX;
                draggingItem.y = e.clientY - rect.top - offsetY;
                draw();
            }
        };

        canvas.onmouseup = (e) => {
            if (draggingItem) {
                const isLeftSide = draggingItem.x + draggingItem.width / 2 < canvas.width / 2;

                // Validação de acerto
                if ((isLeftSide && draggingItem.type === "externo") ||
                    (!isLeftSide && draggingItem.type === "interno")) {
                    draggingItem.fixed = true;
                    draggingItem.color = "#2c3e50";
                } else {
                    // Errou: volta para onde estava
                    draggingItem.x = draggingItem.originalX;
                    draggingItem.y = draggingItem.originalY;
                    alert("Ops! Esse componente não pertence a este lado.");
                }

                draggingItem = null;
                draw();
                checkWin();
            }
        };

        function checkWin() {
            if (items.every(i => i.fixed)) {
                setTimeout(() => {
                    alert("Parabéns! Você organizou todos os componentes!");
                    window.location.href = "/AtividadesGamificadas/teclado2.html";
                }, 100);
            }
        }

        init();
    </script>
</body>

</html>
